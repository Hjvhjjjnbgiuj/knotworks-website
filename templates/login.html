{% extends "base.html" %}

{% block content %}

<section class="page" style="text-align:center">

<h1>Admin Login</h1>

<form method="POST" style="max-width:400px;margin:auto;margin-top:30px">

<input name="username" placeholder="Username" required style="width:100%;padding:10px;margin-bottom:15px">

<input name="password" type="password" placeholder="Password" required style="width:100%;padding:10px;margin-bottom:15px">

<button class="btn-primary">Login</button>

</form>

</section>

{% endblock %}
